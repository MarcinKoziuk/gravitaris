<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   width="210mm"
   height="297mm"
   viewBox="0 0 744.09448819 1052.3622047"
   id_t="svg2"
   version="1.1"
   sodipodi:docname="arrow-1.svg">
  <!-- HUD off-screen target indicator (see CGame::UpdateIndicators). Points
       along local -Y, matching the ship convention (rot 0 = nose along -Y), so
       the caller aims it with rot = atan2(dir.y, dir.x) + PI/2. Outline only
       (fill:none); the stroke is the team-color placeholder (#ff00ff), so the
       per-instance color drives the whole glyph: enemy arrows take the
       enemy's team color, planet arrows the neutral tint. -->
  <g
     inkscape:label="model"
     inkscape:groupmode="layer"
     id_t="layer1"
     style="display:inline">
    <path
       style="fill:none;fill-rule:evenodd;stroke:#ff00ff;stroke-width:2px;stroke-linecap:butt;stroke-linejoin:round;stroke-opacity:1"
       d="M 372,500 L 394,550 L 372,538 L 350,550 Z"
       id_t="path-arrow"
       inkscape:connector-curvature="0" />
  </g>
  <g
     inkscape:groupmode="layer"
     id_t="layer2"
     inkscape:label="@origin"
     style="display:none">
    <circle
       style="opacity:1;fill:#ff0000;fill-opacity:0;stroke:#d45500"
       id_t="path-origin"
       cx="372"
       cy="525"
       r="2.5" />
  </g>
</svg>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GravitarisNG</title>
    <style>
        html, body {
            margin: 0;
            background: #000;
            color: #ccc;
            font-family: monospace;
        }
        #canvas {
            display: block;
            margin: 0 auto;
            width: 1920px;
            height: 1080px;
            max-width: 100%;
            max-height: 100vh;
        }
        #status {
            position: fixed;
            top: 8px;
            left: 8px;
            font-size: 14px;
            white-space: pre;
        }
    </style>
</head>
<body>
    <div id="status">Loading…</div>
    <!-- Magnum's Sdl2Application hardcodes the id "#canvas" on Emscripten. -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            setStatus: function (text) {
                document.getElementById('status').innerText = text;
            },
            print: function (text) {
                console.log(text);
            },
            printErr: function (text) {
                console.error(text);
            },
        };
        Module.setStatus('Downloading…');
    </script>
    <script src="GravitarisNG.js"></script>
</body>
</html>

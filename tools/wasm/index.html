<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GravitarisNG</title>
    <style>
        html, body {
            margin: 0;
            background: #000;
            color: #ccc;
            font-family: monospace;
        }
        #canvas {
            display: block;
            margin: 0 auto;
            width: 1920px;
            height: 1080px;
            max-width: 100%;
            max-height: 100vh;
        }
        #status {
            position: fixed;
            top: 8px;
            left: 8px;
            font-size: 14px;
            white-space: pre;
        }
    </style>
</head>
<body>
    <div id="status">Loading…</div>
    <!-- Magnum's Sdl2Application hardcodes the id "#canvas" on Emscripten. -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            setStatus: function (text) {
                document.getElementById('status').innerText = text;
            },
            print: function (text) {
                console.log(text);
            },
            printErr: function (text) {
                console.error(text);
            },
            onRuntimeInitialized: function () {
                // Magnum's Sdl2Application only re-syncs its internal
                // viewport/framebuffer size in response to an actual size
                // change -- a synthetic `dispatchEvent(new Event('resize'))`
                // with no real dimension change is a no-op (confirmed: it does
                // not fix the bug below), which is presumably why the app
                // looks wrong at the wrong aspect ratio/pixel density on the
                // very first frame but self-corrects the instant the user
                // actually resizes the window. Force a genuine (1px, cosmetically
                // invisible) canvas box change instead: shrink it a frame, then
                // restore, so Magnum's resize handling sees two real deltas
                // and settles on the correct final size on its own.
                const canvas = document.getElementById('canvas');
                requestAnimationFrame(function () {
                    const restoreWidth = canvas.style.width;
                    canvas.style.width = (canvas.clientWidth - 1) + 'px';
                    requestAnimationFrame(function () {
                        canvas.style.width = restoreWidth;
                    });
                });
            },
        };
        Module.setStatus('Downloading…');
    </script>
    <script src="GravitarisNG.js"></script>
</body>
</html>
